{% extends 'base.html' %}

{% block title %}
    <title>Главная</title>
{% endblock %}

{% block content %}

    <div class="row mt-3">
    {% for task in tasks %}
        <div class="col-12 col-md-4 col-lg-3 mb-3">
      <div class="col">
        <div class="card">
          <div class="card-body">
            <h5 class="card-title">{{ task.summary }}</h5>
            <p class="card-text">Тип: {{ task.type.name }}</p>
              <p class="card-text">Статус: {{ task.status.name }}</p>
          </div>
          <div class="card-footer">
              <a href="{% url 'webapp:detail' task.pk %}" title="Подробности"><i class="bi bi-envelope-open-heart-fill"></i></a>
               <a href="{% url 'webapp:update' task.pk %}" title="Редактировать"><i class="bi bi-pencil"></i></a>
              <a href="{% url 'webapp:delete' task.pk %}" title="Удалить"><i class="bi bi-x-square"></i></a>
          </div>
        </div>
  </div>
        </div>
    {% empty %}
<p>Задач пока нет</p>
{% endfor %}
        </div>

{% endblock %}
